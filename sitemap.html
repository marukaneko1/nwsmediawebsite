<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sitemap — NWS Media</title>
  <meta name="description" content="Sitemap of NWS Media. Find all pages: home, book a call, qualify, privacy policy, terms of service.">
  <link rel="canonical" href="https://nwsmedia.com/sitemap.html">
  <link rel="icon" href="favicon.ico" sizes="48x48">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  <style>
    .sitemap-page { padding: 2rem 8vw; max-width: 720px; margin: 0 auto; }
    .sitemap-title { font-family: var(--font-bebas); font-size: clamp(2rem, 5vw, 3rem); letter-spacing: 0.05em; margin-bottom: 2rem; color: var(--foreground); }
    .sitemap-list { list-style: none; }
    .sitemap-list li { margin-bottom: 1rem; }
    .sitemap-list a { font-family: var(--font-outfit); font-size: 1rem; color: var(--foreground); text-decoration: none; transition: color 0.2s; display: flex; align-items: center; padding: 0.5rem 0; min-height: 48px; }
    .sitemap-list a:hover { color: var(--brand-blue-light); }
    .sitemap-section { font-family: var(--font-outfit); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted-foreground); margin: 2rem 0 0.75rem; }
    .sitemap-section:first-child { margin-top: 0; }
  </style>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://nwsmedia.com/" },
      { "@type": "ListItem", "position": 2, "name": "Sitemap", "item": "https://nwsmedia.com/sitemap.html" }
    ]
  }
  </script>
</head>
<body>
  <div class="sitemap-page">
    <h1 class="sitemap-title">Sitemap</h1>
    <nav aria-label="Site map">
      <p class="sitemap-section">Main</p>
      <ul class="sitemap-list">
        <li><a href="https://nwsmedia.com/">Home</a></li>
        <li><a href="https://nwsmedia.com/book-call.html">Book a Call</a></li>
        <li><a href="https://nwsmedia.com/qualify/">Qualify</a></li>
      </ul>
      <p class="sitemap-section">Legal</p>
      <ul class="sitemap-list">
        <li><a href="privacy-policy.html">Privacy Policy</a></li>
        <li><a href="terms-of-service.html">Terms of Service</a></li>
      </ul>
    </nav>
  </div>
</body>
</html>
