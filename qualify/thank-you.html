<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Meta Pixel — fires Lead event on page load -->
  <script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window, document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', '1595015748370906');
  fbq('track', 'PageView');
  fbq('track', 'Lead');
  </script>
  <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=1595015748370906&ev=Lead&noscript=1"/></noscript>

  <title>Thank You — NWS Media</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Favicons -->
  <link rel="icon" href="../favicon.ico" sizes="48x48">
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">

  <style>
    :root {
      --background: #0a0a0a;
      --foreground: #fafafa;
      --brand-blue: #3b82f6;
      --brand-blue-light: #bfdbfe;
      --muted-foreground: #a1a1aa;
      --font-bebas: 'Bebas Neue', sans-serif;
      --font-outfit: 'Outfit', sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--background);
      color: var(--foreground);
      font-family: var(--font-outfit);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .check-circle {
      width: 64px; height: 64px;
      border: 2px solid var(--brand-blue);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      animation: scaleIn 0.5s ease-out;
    }
    @keyframes scaleIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    h1 {
      font-family: var(--font-bebas);
      font-size: clamp(36px, 6vw, 56px);
      text-transform: uppercase;
      letter-spacing: 0.02em;
      line-height: 0.95;
      margin-bottom: 16px;
    }
    p {
      font-size: 15px;
      font-weight: 300;
      color: var(--muted-foreground);
      max-width: 420px;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .redirect-note {
      font-size: 12px;
      color: var(--muted-foreground);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.6;
    }
    .redirect-note span { color: var(--brand-blue-light); }
    a {
      color: var(--brand-blue-light);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
  </style>
</head>
<body>
  <div>
    <div class="check-circle">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>Application Received</h1>
    <p>Thanks for applying. You'll be redirected to book your discovery call in a moment.</p>
    <p class="redirect-note">Redirecting in <span id="countdown">2</span> seconds&hellip;<br>
    or <a href="https://calendly.com/shunya-nwsmedia/30min">click here</a> to book now</p>
  </div>

  <script>
    var seconds = 2;
    var el = document.getElementById('countdown');
    var timer = setInterval(function() {
      seconds--;
      if (el) el.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(timer);
        window.location.href = 'https://calendly.com/shunya-nwsmedia/30min';
      }
    }, 1000);
  </script>
</body>
</html>
