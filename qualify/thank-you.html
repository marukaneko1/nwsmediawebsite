  <style>
    :root {
      --background: #0a0a0a;
      --foreground: #fafafa;
      --brand-blue: #3b82f6;
      --brand-blue-light: #bfdbfe;
      --muted-foreground: #a1a1aa;
      --font-bebas: 'Bebas Neue', sans-serif;
      --font-outfit: 'Outfit', sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--background);
      color: var(--foreground);
      font-family: var(--font-outfit);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .check-circle {
      width: 64px; height: 64px;
      border: 2px solid var(--brand-blue);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      animation: scaleIn 0.5s ease-out;
    }
    @keyframes scaleIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    h1 {
      font-family: var(--font-bebas);
      font-size: clamp(36px, 6vw, 56px);
      text-transform: uppercase;
      letter-spacing: 0.02em;
      line-height: 0.95;
      margin-bottom: 16px;
    }
    p {
      font-size: 15px;
      font-weight: 300;
      color: var(--muted-foreground);
      max-width: 420px;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .redirect-note {
      font-size: 12px;
      color: var(--muted-foreground);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.6;
    }
    .redirect-note span { color: var(--brand-blue-light); }
    a {
      color: var(--brand-blue-light);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
  </style>

    <h1>You're In.</h1>
    <p>We'll review your application and reach out within 24 hours if it's a match. Keep an eye on your phone.</p>
    <p class="redirect-note">Redirecting in <span id="countdown">5</span> seconds&hellip;<br>
    or <a href="https://calendly.com/shunya-nwsmedia/30min">click here</a> to book your call now</p>
  </div>

  <script>
    var seconds = 5;
    var el = document.getElementById('countdown');
    var timer = setInterval(function() {
      seconds--;
      if (el) el.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(timer);
        window.location.href = 'https://calendly.com/shunya-nwsmedia/30min';
      }
    }, 1000);
  </script>
